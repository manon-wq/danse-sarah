<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | DanseLab Val d'Europe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .gradient-bg { background: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl shadow-pink-100 p-8 md:p-12 border border-pink-50">
        
        <header class="text-center mb-10">
            <div class="inline-block px-3 py-1 mb-4 text-[10px] font-bold tracking-widest uppercase bg-pink-100 text-pink-600 rounded-full">
                Étape Finale
            </div>
            <h1 class="serif text-3xl md:text-4xl text-slate-900 mb-3">Réserve ton <span class="italic text-pink-500">Pass Danse</span></h1>
            <p class="text-slate-500 text-sm">Plus que quelques secondes pour débloquer tes -20% exclusifs Ynov.</p>
        </header>

        <form action="merci.html" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Prénom</label>
                    <input type="text" placeholder="Sarah" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Nom de famille</label>
                    <input type="text" placeholder="Dupont" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Email Étudiant (Ynov recommandé)</label>
                <input type="email" placeholder="sarah.d@ynov.com" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition-all">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Ton style de danse</label>
                    <select class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-pink-500 outline-none appearance-none">
                        <option>Classique</option>
                        <option>Moderne / Jazz</option>
                        <option>Urbain / Hip-Hop</option>
                        <option>Contemporain</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Ton niveau</label>
                    <select class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-pink-500 outline-none appearance-none">
                        <option>Débutante</option>
                        <option>Intermédiaire</option>
                        <option>Avancée / Pro</option>
                    </select>
                </div>
            </div>

            <div class="flex items-start gap-3 pt-2">
                <input type="checkbox" id="rgpd" required class="mt-1 w-5 h-5 accent-pink-500 rounded border-slate-300">
                <label for="rgpd" class="text-xs text-slate-500 leading-relaxed">
                    J'accepte que DanseLab traite mes données pour m'envoyer mon code promo et des offres exclusives. Conformément au RGPD, tu peux retirer ton consentement à tout moment.
                </label>
            </div>

            <div class="space-y-3 pt-4">
                <button type="submit" class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-pink-600 transition-all shadow-lg shadow-pink-200 transform hover:-translate-y-1">
                    Activer mes avantages étudiant
                </button>
                <a href="index.html" class="block w-full py-4 text-center text-slate-400 font-medium hover:text-slate-600 transition-colors text-sm">
                    ← Retour à l'accueil
                </a>
            </div>

        </form>
    </div>

</body>
</html>
